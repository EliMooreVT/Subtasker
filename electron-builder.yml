appId: com.subtasker.desktop
productName: Subtasker
files:
  - dist/**/*
  - electron/**/*
  - package.json
directories:
  output: release
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  # For distribution outside the App Store, set CSC_IDENTITY_AUTO_DISCOVERY=false
  # to skip code signing during local builds.
win:
  target: nsis
linux:
  target: AppImage
